<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World - Enhanced</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            overflow: hidden;
        }
        
        .container {
            text-align: center;
            padding: 60px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
            position: relative;
            z-index: 1;
        }
        
        h1 {
            font-size: 3.5em;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
        
        .subtitle {
            font-size: 1.5em;
            margin-bottom: 30px;
            opacity: 0.95;
        }
        
        .features {
            display: flex;
            gap: 30px;
            margin-top: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .feature {
            background: rgba(255, 255, 255, 0.15);
            padding: 20bodyrder-radius: 15px;
            min-width: 200px;
            transition: transform 0.3s ease;
        }
        
        .feature:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.25);
        }
        
        .feature h3 {
            font-size: 1.3em;
            margin-bottom: 10px;
        }
        
        .button {
            display: inline-block;
            margin-top: 30px;
            padding: 15px 40px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            text-decoration: none;
            color: white;
            font-size: 1.1em;
            transition: all 0.3s ease;
            border: 2px solid rgba(255, 255, 255, 0.5);
        }
        
        .button:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: scale(1.05);
        }
        
        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }
        
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        .particle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: float 15s infinite;
        }
        
        @keyframes float {
            0% {
                transform: translateY(100vh) scale(0);
            }
            10% {
                transform: translateY(90vh) scale(1);
            }
            100% {
                transform: translateY(-100vh) scale(0);
            }
        }
    </style>
</head>
<body>
    <div class="particles">
        <div class="particle" style="left: 10%; animation-delay: 0s;"></div>
        <div class="particle" style="left: 20%; animation-delay: 2s;"></div>
        <div class="particle" style="left: 30%; animation-delay: 4s;"></div>
        <div class="particle" style="left: 40%; animation-delay: 6s;"></div>
        <div class="particle" style="left: 50%; animation-delay: 8s;"></div>
        <div class="particle" style="left: 60%; animation-delay: 10s;"></div>
        <div class="particle" style="left: 70%; animation-delay: 12s;"></div>
        <div class="particle" style="left: 80%; animation-delay: 14s;"></div>
        <div class="particle" style="left: 90%; animation-delay: 16s;"></div>
    </div>
    
    <div class="container">
        <h1>Hello, World! 🌍</h1>
        <p class="subtitle">Welcome to the Enhanced Hello World Experience</p>
        
        <div class="features">
            <div class="feature">
                <h3>✨ Modern Design</h3>
                <p>Beautiful glassmorphism effects</p>
            </div>
            <div class="feature">
                <h3>🎨 Animations</h3>
                <p>Smooth and engaging interactions</p>
            </div>
            <div class="feature">
                <h3>📱 Responsive</h3>
                <p>Works on all devices</p>
            </div>
        </div>
        
        <a href="https://github.com/IdeaAssembler/hello-world" class="button">View on GitHub →</a>
        
        <p style="margin-top: 40px; opacity: 0.8;">Created with 💜 using GitHub MCP tools</p>
    </div>
</body>
</html>
